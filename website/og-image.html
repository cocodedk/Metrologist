<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Crimson+Pro:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0D0F0E;
      font-family: 'DM Mono', monospace;
      position: relative;
      /* Engineering grid */
      background-image:
        linear-gradient(rgba(242,242,238,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(242,242,238,0.055) 1px, transparent 1px),
        linear-gradient(rgba(242,242,238,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(242,242,238,0.02) 1px, transparent 1px);
      background-size: 120px 120px, 120px 120px, 24px 24px, 24px 24px;
      color: #F2F2EE;
    }

    /* Staff rail left */
    .rail {
      position: absolute;
      top: 0; left: 0;
      width: 12px;
      height: 630px;
      background: repeating-linear-gradient(
        to bottom,
        #D42B2B 0px, #D42B2B 28px,
        #F2F2EE 28px, #F2F2EE 56px
      );
      box-shadow: 4px 0 20px rgba(212,43,43,0.3);
    }

    /* Staff rail right */
    .rail-right {
      position: absolute;
      top: 0; right: 0;
      width: 12px;
      height: 630px;
      background: repeating-linear-gradient(
        to bottom,
        #F2F2EE 0px, #F2F2EE 28px,
        #D42B2B 28px, #D42B2B 56px
      );
      box-shadow: -4px 0 20px rgba(212,43,43,0.3);
    }

    /* Top staff band */
    .top-band {
      position: absolute;
      top: 0; left: 12px; right: 12px;
      height: 6px;
      background: repeating-linear-gradient(
        to right,
        #D42B2B 0, #D42B2B 32px,
        #F2F2EE 32px, #F2F2EE 64px
      );
      opacity: 0.4;
    }

    /* Bottom staff band */
    .bottom-band {
      position: absolute;
      bottom: 0; left: 12px; right: 12px;
      height: 6px;
      background: repeating-linear-gradient(
        to right,
        #F2F2EE 0, #F2F2EE 32px,
        #D42B2B 32px, #D42B2B 64px
      );
      opacity: 0.4;
    }

    /* Main content area */
    .content {
      position: absolute;
      top: 60px;
      left: 72px;
      right: 72px;
      bottom: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #4A524A;
      margin-bottom: 20px;
    }

    .headline {
      font-family: 'Crimson Pro', Georgia, serif;
      font-weight: 300;
      font-size: 72px;
      line-height: 1.08;
      letter-spacing: -0.01em;
      color: #F2F2EE;
      margin-bottom: 28px;
    }

    .headline em {
      font-style: normal;
      color: #E8A020;
    }

    .subtitle {
      font-family: 'Crimson Pro', Georgia, serif;
      font-weight: 300;
      font-size: 22px;
      color: #8A9189;
      line-height: 1.5;
      max-width: 640px;
    }

    /* Big amber readout (ghost) */
    .ghost-readout {
      position: absolute;
      top: 30px;
      right: 72px;
      font-size: 220px;
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #E8A020;
      opacity: 0.1;
      text-shadow: 0 0 80px rgba(232,160,32,0.3);
      line-height: 1;
      pointer-events: none;
    }

    /* Crosshair SVG */
    .crosshair {
      position: absolute;
      bottom: 60px;
      right: 100px;
      opacity: 0.12;
    }

    /* Bottom meta bar */
    .meta-bar {
      position: absolute;
      bottom: 28px;
      left: 72px;
      right: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .meta-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .meta-brand-name {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8A9189;
    }

    .meta-url {
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #4A524A;
    }

    .badge-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .badge {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 3px;
    }

    .badge-red {
      background: rgba(212,43,43,0.2);
      border: 1px solid rgba(212,43,43,0.4);
      color: #D42B2B;
    }

    .badge-green {
      background: rgba(61,170,107,0.15);
      border: 1px solid rgba(61,170,107,0.3);
      color: #3DAA6B;
    }

    .badge-amber {
      background: rgba(232,160,32,0.12);
      border: 1px solid rgba(232,160,32,0.3);
      color: #E8A020;
    }

    /* Staff icon inline */
    .staff-icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: middle;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div class="rail"></div>
  <div class="rail-right"></div>
  <div class="top-band"></div>
  <div class="bottom-band"></div>

  <div class="ghost-readout">±2%</div>

  <svg class="crosshair" width="200" height="200" viewBox="0 0 160 160">
    <circle cx="80" cy="80" r="70" fill="none" stroke="#F2F2EE" stroke-width="1"/>
    <circle cx="80" cy="80" r="40" fill="none" stroke="#F2F2EE" stroke-width="0.6"/>
    <line x1="80" y1="2" x2="80" y2="158" stroke="#F2F2EE" stroke-width="1"/>
    <line x1="2" y1="80" x2="158" y2="80" stroke="#F2F2EE" stroke-width="1"/>
    <line x1="80" y1="60" x2="80" y2="70" stroke="#E8A020" stroke-width="2"/>
    <line x1="80" y1="90" x2="80" y2="100" stroke="#E8A020" stroke-width="2"/>
    <line x1="60" y1="80" x2="70" y2="80" stroke="#E8A020" stroke-width="2"/>
    <line x1="90" y1="80" x2="100" y2="80" stroke="#E8A020" stroke-width="2"/>
    <circle cx="80" cy="80" r="3" fill="#E8A020"/>
  </svg>

  <div class="content">
    <p class="eyebrow">Single-view planar metrology · Android</p>
    <h1 class="headline">
      Measure with your phone.<br>
      <em>One photo. Real numbers.</em>
    </h1>
    <p class="subtitle">
      Photo measurement app — width, height, area, diagonal, angles. Works offline.
    </p>
  </div>

  <div class="meta-bar">
    <div class="meta-brand">
      <svg width="28" height="28" viewBox="0 0 32 32">
        <rect x="11" y="2" width="10" height="7" rx="1" fill="#D42B2B"/>
        <rect x="11" y="9" width="10" height="7" fill="#F2F2EE"/>
        <rect x="11" y="16" width="10" height="7" fill="#D42B2B"/>
        <rect x="11" y="23" width="10" height="7" rx="1" fill="#F2F2EE"/>
        <line x1="16" y1="12" x2="16" y2="20" stroke="#E8A020" stroke-width="1.5"/>
        <line x1="12" y1="16" x2="20" y2="16" stroke="#E8A020" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="1.2" fill="#E8A020"/>
      </svg>
      <span class="meta-brand-name">Metrologist</span>
      <span class="meta-url">cocodedk.github.io/Metrologist</span>
    </div>
    <div class="badge-row">
      <span class="badge badge-red">Android APK</span>
      <span class="badge badge-green">Free & Open Source</span>
      <span class="badge badge-amber">±1–5% accuracy</span>
    </div>
  </div>
</body>
</html>
