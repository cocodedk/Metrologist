<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Survey staff: 4 alternating bands red/white/red/white -->
  <rect x="11" y="2" width="10" height="7" rx="1" fill="#D42B2B"/>
  <rect x="11" y="9" width="10" height="7" rx="0" fill="#F2F2EE"/>
  <rect x="11" y="16" width="10" height="7" rx="0" fill="#D42B2B"/>
  <rect x="11" y="23" width="10" height="7" rx="1" fill="#F2F2EE"/>
  <!-- Thin tick marks on left side -->
  <rect x="8" y="8" width="3" height="1" fill="#D42B2B"/>
  <rect x="8" y="15.5" width="3" height="1" fill="#F2F2EE"/>
  <rect x="8" y="23" width="3" height="1" fill="#D42B2B"/>
  <!-- Crosshair overlay centered at midpoint -->
  <line x1="16" y1="12" x2="16" y2="20" stroke="rgba(232,160,32,0.9)" stroke-width="1.2"/>
  <line x1="12" y1="16" x2="20" y2="16" stroke="rgba(232,160,32,0.9)" stroke-width="1.2"/>
  <!-- Small center dot -->
  <circle cx="16" cy="16" r="1" fill="#E8A020"/>
</svg>
